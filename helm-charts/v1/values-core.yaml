# Deploy ONLY core-banking-service
global:
  namespace: internet-banking

serviceRegistry:
  enabled: false

configServer:
  enabled: false

apiGateway:
  enabled: false

userService:
  enabled: false

coreBankingService:
  enabled: true
  name: core-banking-service
  replicaCount: 1
  image:
    repository: saroja21/core-banking-service
    tag: "main"
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 8092
  resources:
    requests:
      memory: "512Mi"
      cpu: "100m"
    limits:
      memory: "1Gi"
      cpu: "250m"
  healthCheck:
    enabled: true
    initialDelaySeconds: 240
    periodSeconds: 20
    failureThreshold: 20

fundTransferService:
  enabled: false

utilityPaymentService:
  enabled: false

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0
