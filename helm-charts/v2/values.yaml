# FAULTY version (v2) - Intentional issues for rollback testing
# Issues: Non-existent image tags, invalid health endpoints, low memory limits

global:
  namespace: internet-banking

serviceRegistry:
  enabled: true
  name: service-registry
  replicaCount: 1
  image:
    repository: saroja21/internet-banking-service-registry
    tag: "broken-v2-nonexistent"  # FAULT: Tag doesn't exist
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 8761
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "64Mi"  # FAULT: Too low for Java
      cpu: "50m"
  healthCheck:
    enabled: true
    path: "/non-existent-health"  # FAULT: Invalid endpoint
    initialDelaySeconds: 5
    periodSeconds: 2
    failureThreshold: 1

