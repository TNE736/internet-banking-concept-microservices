apiVersion: apps/v1
kind: Deployment

metadata:
  name: {{ .Values.apiGateway.name }}

spec:
  replicas: {{ .Values.apiGateway.replicas }}

  strategy:
    type: RollingUpdate

    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1

  selector:
    matchLabels:
      app: {{ .Values.apiGateway.name }}

  template:
    metadata:
      labels:
        app: {{ .Values.apiGateway.name }}

    spec:
      containers:
        - name: {{ .Values.apiGateway.name }}

          image: "{{ .Values.apiGateway.image }}:{{ .Values.apiGateway.tag }}"

          ports:
            - containerPort: {{ .Values.apiGateway.port }}

          readinessProbe:
            httpGet:
              path: /actuator/health
              port: {{ .Values.apiGateway.port }}

            initialDelaySeconds: 10
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /actuator/health
              port: {{ .Values.apiGateway.port }}

            initialDelaySeconds: 20
            periodSeconds: 10
